<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>みんなで選べるスポットマップ</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <header class="shell-header">
    <div class="container shell-header-inner">
      <a class="brand-link" href="/">
        <h1 class="brand-title">みんなで選べるスポットマップ</h1>
        <p class="brand-subtitle">地図で候補を見つけて、みんなで選ぶ</p>
      </a>
      <nav class="header-actions">
        <a class="btn ghost" href="/post.html">スポット投稿</a>
        <a class="btn primary" href="/admin.html">管理画面</a>
      </nav>
    </div>
  </header>

  <main class="container app-shell">
    <section class="hero-panel hero-panel-simple">
      <div class="hero-copy">
        <p class="hero-kicker">SpotVote Map</p>
        <h2>行きたい場所、みんなで決めよう</h2>
        <p>公開中のスポットはカテゴリやキーワードで絞り込め、詳細も確認できます。</p>
      </div>
    </section>

    <section class="map-layout">
      <div class="panel map-card">
        <div id="map" class="map"></div>
      </div>

      <aside class="panel">
        <div class="panel-head">
          <div>
            <p class="section-label">Search</p>
            <h3>スポットを探す</h3>
          </div>
        </div>

        <div class="map-toolbar">
          <div class="search-row">
            <input id="keywordInput" type="search" placeholder="キーワード">
            <select id="categorySelect">
              <option value="">すべてのカテゴリ</option>
            </select>
          </div>
        </div>

        <div id="spotList" class="spot-list"></div>
      </aside>
    </section>
  </main>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/map.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
