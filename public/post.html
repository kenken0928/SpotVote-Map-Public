<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>スポット投稿｜みんなで選べるスポットマップ</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <header class="shell-header">
    <div class="container shell-header-inner">
      <a class="brand-link" href="/">
        <h1 class="brand-title">スポット投稿</h1>
        <p class="brand-subtitle">管理者から共有された6桁コードが必要です。</p>
      </a>
      <nav class="header-actions">
        <a class="btn ghost" href="/">公開マップ</a>
      </nav>
    </div>
  </header>

  <main class="container app-shell">
    <div id="feedback" class="form-feedback"></div>

    <section class="dashboard-grid">
      <div class="panel panel-span-7">
        <div class="panel-head">
          <div>
            <p class="section-label">Temporary Post</p>
            <h3>お気に入りスポットを投稿</h3>
            <p>地図上をクリックして入力できます。投稿後、コードは使用済みになります。</p>
          </div>
        </div>

        <div id="postMap" class="map map-small"></div>

        <form id="postForm" style="margin-top:18px;">
          <div class="form-grid">
            <div class="form-field">
              <label for="code">6桁コード</label>
              <input id="code" required inputmode="numeric" pattern="[0-9]{6}" maxlength="6" placeholder="123456">
            </div>

            <div class="form-field">
              <label for="categoryId">カテゴリ</label>
              <select id="categoryId"></select>
            </div>

            <div class="form-field form-span-2">
              <label for="title">タイトル</label>
              <input id="title" required maxlength="160">
            </div>

            <div class="form-field">
              <label for="lat">緯度</label>
              <input id="lat" required type="number" step="any">
            </div>

            <div class="form-field">
              <label for="lng">経度</label>
              <input id="lng" required type="number" step="any">
            </div>

            <div class="form-field form-span-2">
              <label for="description">説明</label>
              <textarea id="description"></textarea>
            </div>

            <div class="form-field form-span-2">
              <label for="address">住所</label>
              <input id="address">
            </div>

            <div class="form-field form-span-2">
              <label for="url">URL任意</label>
              <input id="url" type="url">
            </div>

            <div class="form-field form-span-2">
              <label for="imageFile">画像任意</label>
              <input id="imageFile" type="file" accept="image/jpeg,image/png,image/webp">
              <div id="imagePreviewWrap" class="image-preview-wrap" hidden>
                <img id="imagePreview" class="image-preview" alt="選択中の画像プレビュー">
                <button class="btn small ghost" id="clearImageButton" type="button">画像選択を解除</button>
              </div>
            </div>
          </div>

          <div class="form-actions" style="margin-top:18px;">
            <button class="btn primary" type="submit">投稿する</button>
          </div>
        </form>
      </div>

      <aside class="panel panel-span-5">
        <p class="section-label">Guide</p>
        <h3>投稿時の注意</h3>
        <div class="notice">
          管理者から共有される6桁の認証コードが必要です。
          公開前提の情報だけを入力してください。
          誹謗中傷は絶対にやめましょう。
        </div>
      </aside>
    </section>
  </main>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/map.js"></script>
  <script src="/js/post.js"></script>
</body>
</html>
