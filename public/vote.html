<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>投票イベント｜みんなで選べるスポットマップ</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <header class="shell-header">
    <div class="container shell-header-inner">
      <a class="brand-link" href="/">
        <h1 class="brand-title">投票イベント</h1>
        <p class="brand-subtitle">候補を見比べて、行きたい場所を選んでください。</p>
      </a>
      <nav class="header-actions">
        <a class="btn ghost" href="/">公開マップ</a>
      </nav>
    </div>
  </header>

  <main class="container app-shell">
    <div id="feedback" class="form-feedback"></div>

    <section class="hero-panel">
      <div class="hero-copy">
        <p class="hero-kicker">Vote Event</p>
        <h2 id="eventTitle">読み込み中...</h2>
        <p id="eventDescription"></p>
      </div>
      <div class="hero-metrics">
        <div class="metric-card">
          <span class="metric-label">投票期限</span>
          <strong class="metric-value" id="eventExpires">-</strong>
        </div>
        <div class="metric-card">
          <span class="metric-label">候補数</span>
          <strong class="metric-value" id="candidateCount">-</strong>
        </div>
      </div>
    </section>

    <section class="dashboard-grid">
      <div class="panel panel-span-7">
        <div class="panel-head">
          <div>
            <p class="section-label">Candidates</p>
            <h3>候補スポット</h3>
          </div>
          <button class="btn ghost" id="randomButton" type="button">ランダム選択</button>
        </div>
        <div id="candidateList" class="vote-candidate-grid"></div>
      </div>

      <div class="panel panel-span-5">
        <div class="panel-head">
          <div>
            <p class="section-label">Map</p>
            <h3>地図</h3>
          </div>
        </div>
        <div id="voteMap" class="map map-small"></div>

        <hr style="border:0;border-top:1px solid var(--line);margin:20px 0;">

        <form id="voteForm">
          <div class="form-grid">
            <div class="form-field form-span-2">
              <label for="voterName">お名前</label>
              <input id="voterName" name="voterName" required maxlength="80" placeholder="例：田中">
            </div>
            <div class="form-field form-span-2">
              <label for="voterComment">コメント任意</label>
              <textarea id="voterComment" name="voterComment" maxlength="500" placeholder="理由や補足があれば入力"></textarea>
            </div>
          </div>
          <div class="form-actions" style="margin-top:16px;">
            <button class="btn primary" type="submit">この候補に投票する</button>
          </div>
        </form>
      </div>

      <div class="panel panel-span-12">
        <div class="panel-head">
          <div>
            <p class="section-label">Results</p>
            <h3>投票結果</h3>
            <p>投票済みの内容を一覧で確認できます。</p>
          </div>
        </div>
        <div id="resultList" class="result-list"></div>
      </div>
    </section>
  </main>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/map.js"></script>
  <script src="/js/vote.js"></script>
</body>
</html>
